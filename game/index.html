<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Serene City Explorer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Main Menu -->
    <div id="mainMenu" class="menu-screen">
        <h1 class="game-title">Serene City</h1>
        <p class="subtitle">Explore • Collect • Relax</p>
        <div class="menu-buttons">
            <button id="playBtn" class="menu-btn">Play</button>
            <button id="settingsBtn" class="menu-btn">Settings</button>
        </div>
    </div>

    <!-- Settings Menu -->
    <div id="settingsMenu" class="menu-screen hidden">
        <h2 class="menu-title">Settings</h2>
        <div class="settings-options">
            <div class="setting-item">
                <label for="musicVolume">Music Volume</label>
                <input type="range" id="musicVolume" min="0" max="100" value="70">
            </div>
            <div class="setting-item">
                <label for="sfxVolume">SFX Volume</label>
                <input type="range" id="sfxVolume" min="0" max="100" value="80">
            </div>
            <div class="setting-item">
                <label for="graphicsQuality">Graphics Quality</label>
                <select id="graphicsQuality">
                    <option value="low">Low</option>
                    <option value="medium" selected>Medium</option>
                    <option value="high">High</option>
                </select>
            </div>
            <div class="setting-item">
                <label for="controls">Controls</label>
                <select id="controls">
                    <option value="touch">Touch</option>
                    <option value="keyboard">Keyboard</option>
                </select>
            </div>
        </div>
        <button id="backBtn" class="menu-btn">Back</button>
    </div>

    <!-- Game Canvas -->
    <div id="gameContainer" class="hidden">
        <canvas id="gameCanvas"></canvas>
        
        <!-- HUD -->
        <div id="hud">
            <div class="coin-counter">
                <span class="coin-icon">🪙</span>
                <span id="coinCount">0</span>
            </div>
            <button id="pauseBtn" class="hud-btn">⏸️</button>
        </div>

        <!-- Pause Menu -->
        <div id="pauseMenu" class="menu-screen hidden">
            <h2 class="menu-title">Paused</h2>
            <div class="menu-buttons">
                <button id="resumeBtn" class="menu-btn">Resume</button>
                <button id="quitBtn" class="menu-btn">Quit to Menu</button>
            </div>
        </div>

        <!-- Mobile Controls -->
        <div id="mobileControls" class="hidden">
            <div class="joystick-area">
                <div id="joystickBase" class="joystick-base">
                    <div id="joystickKnob" class="joystick-knob"></div>
                </div>
            </div>
            <button id="jumpBtn" class="mobile-action-btn">Jump</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
